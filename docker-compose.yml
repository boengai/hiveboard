services:
  hiveboard:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
    env_file: .env
    environment:
      - NODE_ENV=production
      - API_PORT=8080
    volumes:
      - ./tmp/database:/app/tmp/database
      - ./tmp/workspaces:/app/tmp/workspaces
      - ./tmp/agents/.claude:/home/hiveboard/.claude
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8080/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
